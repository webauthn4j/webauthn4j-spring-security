name: WebAuthn4J Snapshot Compatibility Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compatibility-test:
    name: Test with WebAuthn4J master snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Get latest webauthn4j commit hash
        id: webauthn4j-commit
        run: |
          COMMIT_HASH=$(gh api repos/webauthn4j/webauthn4j/commits/master --jq '.sha' | head -c 10)
          echo "hash=$COMMIT_HASH" >> "$GITHUB_OUTPUT"
          echo "Using webauthn4j commit: $COMMIT_HASH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Wait for JitPack build
        run: |
          HASH=${{ steps.webauthn4j-commit.outputs.hash }}
          POM_URL="https://jitpack.io/com/github/webauthn4j/webauthn4j/webauthn4j-core/${HASH}/webauthn4j-core-${HASH}.pom"
          echo "Waiting for JitPack build: $POM_URL"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$POM_URL")
            if [ "$STATUS" = "200" ]; then
              echo "JitPack build ready"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $STATUS, waiting 30s..."
            sleep 30
          done
          echo "::error::JitPack build timed out after 15 minutes"
          exit 1

      - name: Run tests
        run: ./gradlew check -PjitpackWebauthn4jVersion=${{ steps.webauthn4j-commit.outputs.hash }}
